services:
  operator:
    build:
      args:
        NETWORK: hoodi
        P2P_PORT: 9102
        QUIC_PORT: 9103
    ports:
      - "9102:9102/tcp"
      - "9102:9102/udp"
      - "9103:9103/udp"
  dkg:
    build:
      args:
        NETWORK: hoodi
        DKG_PORT: 15514
    ports:
      - "15514:15514"
