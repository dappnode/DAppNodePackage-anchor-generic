version: "2"
fields:
  - id: setup-mode
    target:
      type: environment
      name: SETUP_MODE
      service: operator
    title: Setup Mode
    description: |-
      If this is the first install, choose "New operator". If you have an existing operator key, choose "Import Operator".
    enum:
      - "New Operator"
      - "Import Operator"
    required: true

  - id: builder-proposals
    target:
      type: environment
      name: BUILDER_PROPOSALS
      service: operator
    title: Builder Proposals
    description: |-
      Whether to enable MEV-boost block production.
    enum:
      - "true"
      - "false"
    required: true
    default: "false"

  - id: encrypted-private-key
    target:
      type: fileUpload
      path: /root/.anchor/encrypted_private_key.json
      service: operator
    title: Encrypted private key
    description: |
      Upload the encrypted_private_key.json
    pattern: "\\.json"
    required: true
    if: { "setup-mode": { "enum": ["Import Operator"] } }

  - id: encrypted-private-key-password
    target:
      type: environment
      name: PRIVATE_KEY_PASS
      service: operator
    title: Encrypted private key password
    secret: true
    description: |
      Provide here the encrypted private key password.
    required: true
    if: { "setup-mode": { "enum": ["Import Operator"] } }
