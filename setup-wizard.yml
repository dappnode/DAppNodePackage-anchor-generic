version: "2"
fields:
  - id: setup-mode
    target:
      type: environment
      name: SETUP_MODE
      service: operator
    title: Setup Mode
    description: |-
      If this is the first install, choose "New operator". If you have an existing operator key, choose "Import Operator".
    enum:
      - "New Operator"
      - "Import Operator"
    required: true

  - id: encrypted-private-key
    target:
      type: fileUpload
      path: /root/.anchor/encrypted_private_key.json
      service: operator
    title: Encrypted private key
    description: |
      Upload encrypted_private_key.json (must name the file exactly as shown)
    pattern: "\\.json"
    required: true
    if: { "setup-mode": { "enum": ["Import Operator"] } }

  - id: existing-private-key-password
    target:
      type: environment
      name: EXISTING_PASSWORD
      service: operator
    title: Password for the existing private key
    secret: true
    description: |
      Enter the password for the existing private key
    inputType: password
    required: false
    if: { "setup-mode": { "enum": ["Import Operator"] } }

  - id: encrypted-private-key-password-file
    target:
      type: fileUpload
      path: /root/.anchor/password.txt
      service: operator
    title: Encrypted private key password file
    description: |
      Upload password.txt (must name the file exactly as shown)
    pattern: "\\.txt"
    required: false
    if: { "setup-mode": { "enum": ["Import Operator"] } }

  - id: new-private-key-password-file
    target:
      type: fileUpload
      path: /root/.anchor/password.txt
      service: operator
    title: Password file for the new private key
    description: |
      Upload a password file to encrypt your private key, name the file as: password.txt
    pattern: "\\.txt"
    required: false
    if: { "setup-mode": { "enum": ["New Operator"] } }

  - id: new-private-key-password
    target:
      type: environment
      name: NEW_PASSWORD
      service: operator
    title: Password for the new private key
    secret: true
    description: |
      Enter a password to encrypt your private key

      (Note: This password will be used to decrypt the private key. If you loss the password, you can no longer decrypt the operator private key)
    inputType: password
    required: true
    if: { "setup-mode": { "enum": ["New Operator"] } }
