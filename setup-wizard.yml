version: "2"
fields:
  - id: setup-mode
    target:
      type: environment
      name: SETUP_MODE
      service: operator
    title: Setup Mode
    description: |-
      If this is the first install, choose "New operator". If you have an existing operator key, choose "Import Operator".
    enum:
      - "New Operator"
      - "Import Operator"
    required: true

  - id: encrypted-private-key
    target:
      type: fileUpload
      path: /root/.anchor/encrypted_private_key.json
      service: operator
    title: Encrypted private key
    description: |
      Upload encrypted_private_key.json (must name the file exactly as shown)
    pattern: "\\.json"
    required: true
    if: { "setup-mode": { "enum": ["Import Operator"] } }

  - id: encrypted-private-key-password-file
    target:
      type: fileUpload
      path: /root/.anchor/password.txt
      service: operator
    title: Encrypted private key password file
    description: |
      Upload password.txt (must name the file exactly as shown)
    pattern: "\\.txt"
    required: true
    if: { "setup-mode": { "enum": ["Import Operator"] } }
